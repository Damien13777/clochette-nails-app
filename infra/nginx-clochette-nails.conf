# ============================================================
# Nginx site config — clochette-nails.fr
# À copier dans /etc/nginx/sites-available/clochette-nails.fr
# puis : ln -s /etc/nginx/sites-available/clochette-nails.fr /etc/nginx/sites-enabled/
# ============================================================
#
# Avant Certbot : juste le bloc HTTP (port 80) ci-dessous.
# Après Certbot --nginx : il ajoute automatiquement le bloc HTTPS (port 443)
# et redirige HTTP → HTTPS.
# ============================================================

# Upstream Node.js app (PM2)
upstream clochette_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Redirection automatique HTTP → HTTPS gérée par Certbot après setup SSL
server {
    listen 80;
    listen [::]:80;
    server_name clochette-nails.fr www.clochette-nails.fr;

    # Let's Encrypt challenge (avant SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # ─── BLOC AVANT SSL : reverse proxy direct ─────────────
    # Une fois Certbot configuré, ce bloc sera remplacé par
    # une redirection 301 vers HTTPS (Certbot le fait auto)
    location / {
        proxy_pass http://clochette_app;
        include /etc/nginx/proxy_params;
    }
}

